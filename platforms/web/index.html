<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title><%- name %></title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="description" content="<%- description %>" data-react-helmet="true" />
    <meta name="twitter:card" content="summary" data-react-helmet="true" />
    <meta property="og:title" content="<%- name %>" data-react-helmet="true" />
    <meta property="og:description" content="<% description %>" data-react-helmet="true" />
    <meta property="og:image" content="/images/icons/app-icon.png" data-react-helmet="true" />

    <link rel="icon" href="/images/icons/favicon.ico" type="image/x-icon" sizes="any" />
    <%- favicons %>

    <!-- Pre-connect JW Player origins -->
    <link rel="preconnect" href="https://content.jwplatform.com" />
    <link rel="preconnect" href="https://cdn.jwplayer.com" />

    <!-- Safari web app -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Chrome, Firefox OS and Opera -->
    <meta name="theme-color" content="#000000" />
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-status-bar-style" content="#000000" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Cookiebot -->
    <script
      id="Cookiebot"
      src="https://consent.cookiebot.com/uc.js"
      data-cbid="603d6ef7-9d8b-408a-81cb-0af069643a8e"
      data-blockingmode="auto"
      type="text/javascript"
    ></script>

    <script data-cookieconsent="ignore">
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('consent', 'default', {
        ad_personalization: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'denied',
        personalization_storage: 'denied',
        security_storage: 'granted',
        wait_for_update: 500,
      });
      gtag('set', 'ads_data_redaction', true);
      gtag('set', 'url_passthrough', false);
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G0H3J6ETLJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());

      gtag('config', 'G-G0H3J6ETLJ');
    </script>

    <!-- Facebook Pixel Code -->

    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };

        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = '2.0';

        n.queue = [];
        t = b.createElement(e);
        t.async = !0;

        t.src = v;
        s = b.getElementsByTagName(e)[0];

        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        'script',

        'https://connect.facebook.net/en_US/fbevents.js',
      );

      fbq('init', '{421879392785610}');

      fbq('track', 'PageView');
    </script>

    <!-- End Facebook Pixel Code -->
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <img height="1" width="1" style="display: none" src="https://www.facebook.com/tr?id=421879392785610&ev=PageView&noscript=1" />
    </noscript>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script type="module" src="/src/index.tsx"></script>
    <script
      id="Cookiebot"
      src="https://consent.cookiebot.com/uc.js"
      data-cbid="603d6ef7-9d8b-408a-81cb-0af069643a8e"
      data-blockingmode="auto"
      type="text/javascript"
    ></script>
  </body>
</html>
